# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*
# Fix some dragging issues with XWayland
windowrule = no_focus 1, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Allow tearing for better latency
windowrule = immediate 1, match:fullscreen 1

windowrule = monitor $left_monitor, match:class ^(com.mitchellh.ghostty)$
windowrule = monitor $right_monitor, match:class ^(discord)$
windowrule = monitor $right_monitor, match:class ^(spotify)$
windowrule = monitor $middle_monitor, match:class ^(firefox)$
windowrule = monitor $middle_monitor, match:class ^(dev.zed.Zed)$

# Steam
windowrule = float 1, match:class ^(steam)$
windowrule = tile 1, match:class ^(steam)$, match:title ^(Steam)$
